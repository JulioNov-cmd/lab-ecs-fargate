name: DevSecOps Pipeline Hardened

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecs-fargate-lab
  ECS_CLUSTER: ecs-fargate-lab-cluster
  ECS_SERVICE: ecs-fargate-lab-service
  CONTAINER_NAME: ecs-fargate-lab

jobs:
# ------------------------
# 1. BUILD & PUSH
# ------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::116981775264:role/ecs-fargate-lab-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        id: build
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          echo "Building secure image: $IMAGE"
          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE \
            --push ./app
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

# ------------------------
# 2. SECURITY GATES (CI)
# ------------------------
  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::116981775264:role/ecs-fargate-lab-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy Scan (CRITICAL BLOCK)
        uses: aquasecurity/trivy-action@master  # Volvamos a master o usa v0.20.0
        with:
          image-ref: ${{ needs.build.outputs.image }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image }}

# ------------------------
# 3. APPROVAL GATE
# ------------------------
  approval:
    runs-on: ubuntu-latest
    needs: security_scan
    environment: production
    steps:
      - name: Manual approval gate
        run: echo "Waiting for approval via GitHub Environments"

# ------------------------
# 4. DEPLOY
# ------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build, approval] # Importante: necesita la salida de build y la aprobación
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::116981775264:role/ecs-fargate-lab-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

# ------------------------
# 5. DAST (POST DEPLOY)
# ------------------------
  zap_scan:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://ecs-fargate-lab-alb-1574663482.us-east-1.elb.amazonaws.com"
          fail_action: false